spring.application.name=payment-service
server.port=8004

# Database Configuration (MySQL)
# Override credentials in application-local.properties for local dev
spring.datasource.url=jdbc:mysql://localhost:3306/dbpaymentservice
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Stripe Configuration
# For local dev: set values in application-local.properties (gitignored)
# For production: inject as environment variables STRIPE_SECRET_KEY, etc.
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
