server:
  port: 8000

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: user-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/users/**, /health, /
        - id: user-service-docs
          uri: http://localhost:8001
          predicates:
            - Path=/user-service/v3/api-docs
          filters:
            - RewritePath=/user-service/(?<segment>.*), /$\{segment}
        - id: menu-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/menu/**
        - id: menu-service-docs
          uri: http://localhost:8002
          predicates:
            - Path=/menu-service/v3/api-docs
          filters:
            - RewritePath=/menu-service/(?<segment>.*), /$\{segment}
        - id: order-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/orders/**
        - id: order-service-docs
          uri: http://localhost:8003
          predicates:
            - Path=/order-service/v3/api-docs
          filters:
            - RewritePath=/order-service/(?<segment>.*), /$\{segment}
        - id: payment-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/payments/**
        - id: payment-service-docs
          uri: http://localhost:8004
          predicates:
            - Path=/payment-service/v3/api-docs
          filters:
            - RewritePath=/payment-service/(?<segment>.*), /$\{segment}

springdoc:
  swagger-ui:
    urls:
      - name: user-service
        url: /user-service/v3/api-docs
        displayName: User Service API
      - name: menu-service
        url: /menu-service/v3/api-docs
        displayName: Menu Service API
      - name: order-service
        url: /order-service/v3/api-docs
        displayName: Order Service API
      - name: payment-service
        url: /payment-service/v3/api-docs
        displayName: Payment Service API
    primary-name: user-service
    display-query-config: true
